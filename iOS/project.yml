name: Mortarline
options:
  bundleIdPrefix: com.shimondeitel.mortarline
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Mortarline:
    type: application
    platform: iOS
    sources:
      - path: Mortarline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.mortarline
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Mortarline/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  MortarlineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MortarlineTests
      - path: Mortarline.storekit
    dependencies:
      - target: Mortarline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.mortarline.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  MortarlineUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MortarlineUITests
    dependencies:
      - target: Mortarline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.mortarline.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Mortarline:
    build:
      targets:
        Mortarline: all
        MortarlineTests: [test]
        MortarlineUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Mortarline.storekit
    test:
      config: Debug
      storeKitConfiguration: Mortarline.storekit
      targets:
        - MortarlineTests
        - MortarlineUITests
    archive:
      config: Release
